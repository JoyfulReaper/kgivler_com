<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: OBJECT NOT FOUND</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/styles.css?v=2">
</head>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<body class="terminal-theme">
    <div class="main-container">
        <div class="terminal-window">
            <div class="terminal-header">
                <span class="terminal-dot close-dot"></span>
                <span class="terminal-dot minimize-dot"></span>
                <span class="terminal-dot expand-dot"></span>
                <span class="terminal-title">bash — error_handler.sh</span>
            </div>
            
            <div class="terminal-body text-center py-5">
                <div class="mb-4">
                    <p class="cmd-line text-start"><span class="prompt">kyle@kgivler:~$</span> get --status current_route</p>
                    <h1 class="display-1 fw-bold text-danger dynamic-pulse mt-3">404</h1>
                    <p class="terminal-lead text-white fw-bold">ERROR: OBJECT NOT FOUND</p>
                    <p class="text-muted font-monospace">The requested vector does not exist or has been detached from the host array.</p>
                </div>
                
                <hr class="terminal-divider my-4">
                
                <div class="py-3">
                    <a href="/" class="terminal-btn">
                        <i class="fas fa-undo me-2"></i>return_to_mainframe.exe
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
